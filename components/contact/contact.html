<section id="contact" class="contact">
    <div class="container">
        <div class="section-title">
            <h2>Liên Hệ</h2>
            <div class="underline"></div>
        </div>
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Bạn có dự án thú vị?</h3>
                <p>Hãy gửi tin nhắn, tôi luôn sẵn sàng thảo luận về những cơ hội và công nghệ mới.</p>
                <div class="contact-details">
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <span>hoangkhang054@gmail.com</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <span>+84 (0) 372 941 936</span>
                    </div>
                </div>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <input type="text" placeholder="Họ và tên" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <textarea placeholder="Nội dung tin nhắn" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Gửi Tin Nhắn</button>
            </form>
        </div>
    </div>
</section>
