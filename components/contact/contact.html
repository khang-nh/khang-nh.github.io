<section id="contact" class="contact">
    <div class="container">
        <div class="section-title">
            <h2>Liên Hệ</h2>
            <div class="underline"></div>
        </div>
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Bạn có dự án thú vị?</h3>
                <p>Hãy gửi tin nhắn, tôi luôn sẵn sàng thảo luận về những cơ hội và công nghệ mới.</p>
                <div class="contact-details">
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <span>hoangkhang054@gmail.com</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <span>+84 (0) 372 941 936</span>
                    </div>
                </div>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Họ và tên" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Nội dung tin nhắn" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Gửi Tin Nhắn</button>
            </form>

        </div>
        
        <!-- Success Popup -->
        <div id="success-popup" class="success-popup">
            <div class="popup-content">
                <i class="fas fa-check-circle"></i>
                <h3>Thành công!</h3>
                <p>Cảm ơn bạn đã liên hệ. Tin nhắn của bạn đã được gửi đi thành công.</p>
                <button id="close-popup" class="btn btn-primary">Đóng</button>
            </div>
        </div>
    </div>
</section>
